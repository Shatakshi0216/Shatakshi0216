<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
  </defs>

  <rect width="900" height="420" fill="url(#bg)" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#30363d" stroke-width="2" rx="12"/>

  <!-- Architectural Title -->
  <text x="30" y="35" fill="#a3a3a3" font-family="monospace" font-size="16" letter-spacing="2">RESUME_FORGE //_HYBRID_INTELLIGENCE</text>

  <!-- COLUMN 1: INPUT STREAM -->
  <g transform="translate(40, 70)">
    <rect width="200" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">DATA_INPUT</text>
    <path d="M 50 80 L 150 80 M 50 120 L 150 120 M 50 160 L 150 160" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
    <text x="100" y="240" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="12">PDF + JOB_DESC</text>
  </g>

  <!-- COLUMN 2: THE HYBRID SPLIT -->
  <g transform="translate(300, 70)">
    <rect width="300" height="280" rx="8" fill="#161b22" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
    <text x="150" y="30" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-weight="bold">HYBRID_AI_PIPELINE</text>
    
    <!-- Path to Local -->
    <path d="M 150 50 L 50 120" stroke="#a3a3a3" stroke-width="2"/>
    <rect x="20" y="120" width="60" height="60" rx="4" fill="#1f2937"/>
    <text x="50" y="155" text-anchor="middle" fill="#ff007f" font-family="monospace" font-size="10">LOCAL_NLP</text>

    <!-- Path to Gemini -->
    <path d="M 150 50 L 250 120" stroke="#a3a3a3" stroke-width="2"/>
    <rect x="220" y="120" width="60" height="60" rx="4" fill="#1f2937"/>
    <text x="250" y="155" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="10">GEMINI_API</text>

    <text x="150" y="240" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="14">LATENCY_OPT: 2s</text>
  </g>

  <!-- COLUMN 3: OUTPUT ANALYTICS -->
  <g transform="translate(660, 70)">
    <rect width="200" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">ATS_METRICS</text>
    
    <path d="M 40 100 L 160 100" stroke="#374151" stroke-width="10" rx="5"/>
    <path d="M 40 100 L 140 100" stroke="#ff007f" stroke-width="10" rx="5"/>
    
    <text x="100" y="160" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="24" font-weight="bold">85%</text>
    <text x="100" y="180" text-anchor="middle" fill="#a3a3a3" font-family="monospace" font-size="10">MATCH_SCORE</text>
  </g>

  <!-- Flow Arrows -->
  <path d="M 240 210 L 300 210" stroke="#30363d" stroke-width="2" stroke-dasharray="4"/>
  <path d="M 600 210 L 660 210" stroke="#30363d" stroke-width="2" stroke-dasharray="4"/>
</svg>
