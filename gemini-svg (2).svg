<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <style>
    .title { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #ff007f; font-size: 18px; letter-spacing: 2px; }
    .subtitle { font-family: 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; font-size: 13px; letter-spacing: 1px; }
    .body { font-family: 'Segoe UI', sans-serif; fill: #a3a3a3; font-size: 12px; }
    .tech-tag { font-family: 'Orbitron', monospace; font-weight: 700; fill: #00f0ff; font-size: 10px; }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="220" rx="12" fill="#070a13" stroke="#1f2438" stroke-width="1.5" />
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 200 0 L 200 220" stroke="#101524" stroke-width="1" />

  <g transform="translate(40, 30)">
    <rect width="160" height="160" rx="10" fill="#0c0f1d" stroke="#ff007f" stroke-width="1.5" filter="url(#glow)" />
    <rect x="50" y="45" width="60" height="75" rx="5" fill="none" stroke="#00f0ff" stroke-width="2" />
    <line x1="60" y1="65" x2="100" y2="65" stroke="#00f0ff" stroke-width="2" />
    <line x1="60" y1="80" x2="100" y2="80" stroke="#00f0ff" stroke-width="2" />
    <line x1="60" y1="95" x2="85" y2="95" stroke="#ff007f" stroke-width="2" />
    <line x1="40" y1="85" x2="120" y2="85" stroke="#ff007f" stroke-width="3" filter="url(#glow)" />
  </g>

  <g transform="translate(230, 35)">
    <text x="0" y="25" class="title">🛠️ RESUME FORGE // EXPERT</text>
    <text x="0" y="50" class="subtitle">AI Development Collaborator</text>
    <text x="0" y="80" class="body">Developed a Streamlit &amp; Gemini API powered ATS parser optimization platform.</text>
    <text x="0" y="100" class="body">Designed and implemented Gemini API calls, reducing response latency from 8s to 2s.</text>
    <text x="0" y="120" class="body">Architected semantic keyword extraction algorithms isolating up to 15 key skills.</text>
    
    <g transform="translate(0, 145)">
      <rect width="90" height="22" rx="5" fill="#1c2438" />
      <text x="45" y="14" class="tech-tag" text-anchor="middle">GEMINI API</text>
      
      <rect x="100" width="85" height="22" rx="5" fill="#1c2438" />
      <text x="142.5" y="14" class="tech-tag" text-anchor="middle">STREAMLIT</text>
      
      <rect x="195" width="85" height="22" rx="5" fill="#1c2438" />
      <text x="237.5" y="14" class="tech-tag" text-anchor="middle">LANGCHAIN</text>
    </g>
  </g>
</svg>
