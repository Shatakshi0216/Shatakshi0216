    <text x="25" y="230" fill="#9ca3af" font-family="monospace" font-size="11">EfficientNetB0 (Low Light Image Detected)</text>
    <rect x="25" y="240" width="380" height="8" rx="4" fill="#1f2937" />
    <rect x="25" y="240" width="160" height="8" rx="4" fill="#ff007f" filter="url(#glowPink)" />
    <text x="375" y="230" fill="#ff007f" font-family="monospace" font-size="11">42%</text>

    <text x="25" y="280" fill="#9ca3af" font-family="monospace" font-size="11">Gemini Vision (Multimodal Fallback Triggered)</text>
    <rect x="25" y="290" width="380" height="8" rx="4" fill="#1f2937" />
    <rect x="25" y="290" width="360" height="8" rx="4" fill="#00f0ff" filter="url(#glowCyan)" />
    <text x="375" y="280" fill="#00f0ff" font-family="monospace" font-size="11">96%</text>

    <rect x="25" y="315" width="120" height="20" rx="4" fill="#064e3b" />
    <text x="85" y="328" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">1,200+ ACTIVE USERS</text>

    <rect x="155" y="315" width="100" height="20" rx="4" fill="#1e3a8a" />
    <text x="205" y="328" fill="#60a5fa" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">TWILIO API LOGGED</text>
  </g>
