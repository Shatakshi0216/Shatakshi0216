    <circle cx="30" cy="25" r="10" fill="#00E676" filter="url(#glowGreen)" />
    <text x="50" y="30" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="bold" font-size="14">KrishiMitra AI</text>
    <text x="50" y="43" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">Bot • Online</text>

    <rect x="70" y="70" width="150" height="90" rx="12" fill="#374151" />
    <rect x="80" y="80" width="130" height="50" rx="6" fill="#1f2937" />
    <path d="M 145 90 Q 165 90 165 110 Q 165 130 145 130 Q 125 130 125 110 Q 125 90 145 90 Z" fill="#10b981" />
    <text x="210" y="148" text-anchor="end" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="11">मक्का में कौनसी बीमारी है?</text>

    <text x="20" y="185" fill="#00f0ff" font-family="monospace" font-size="10" filter="url(#glowCyan)">> Analyzing via FastAPI...</text>

    <rect x="20" y="200" width="190" height="90" rx="12" fill="#064e3b" />
    <text x="30" y="220" fill="#10b981" font-family="system-ui, sans-serif" font-weight="bold" font-size="12">Gemini Vision Analysis:</text>
    <text x="30" y="240" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="11">फंगल संक्रमण का संकेत।</text>
    <text x="30" y="255" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="11">Northern Corn Leaf Blight.</text>
    <text x="30" y="275" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="10">उपचार: फफूंदनाशी का उपयोग करें।</text>
  </g>

  <path d="M 290 130 C 330 130 330 150 370 150" fill="none" stroke="#00f0ff" stroke-width="3" stroke-dasharray="6 4" filter="url(#glowCyan)" />
  <circle cx="330" cy="140" r="4" fill="#ff007f" filter="url(#glowPink)">
    <animate attributeName="cx" values="290; 370" dur="2s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(370, 40)">
