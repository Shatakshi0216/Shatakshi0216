    <text x="65" y="114" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">1. Local CNN (EfficientNetB0) → Fast Classification</text>
    
    <circle cx="50" cy="135" r="4" fill="#ff007f" />
    <text x="65" y="139" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="12">2. If Confidence &lt; 85% → Route to Gemini Vision</text>

