<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <style>
    .title { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #ff007f; font-size: 18px; letter-spacing: 2px; }
    .subtitle { font-family: 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; font-size: 13px; letter-spacing: 1px; }
    .body { font-family: 'Segoe UI', sans-serif; fill: #a3a3a3; font-size: 12px; }
    .tech-tag { font-family: 'Orbitron', monospace; font-weight: 700; fill: #00f0ff; font-size: 10px; }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="220" rx="12" fill="#070a13" stroke="#1f2438" stroke-width="1.5" />
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 200 0 L 200 220" stroke="#101524" stroke-width="1" />

  <g transform="translate(40, 30)">
    <rect width="160" height="160" rx="10" fill="#0c0f1d" stroke="#ff007f" stroke-width="1.5" filter="url(#glow)" />
    <!-- Leaf Vector -->
    <path d="M 80 40 C 50 70 50 110 80 120 C 110 110 110 70 80 40 Z" fill="none" stroke="#00f0ff" stroke-width="2" />
    <path d="M 80 40 C 70 65 70 95 80 120" fill="none" stroke="#ff007f" stroke-width="1.5" />
    <path d="M 80 60 C 90 70 95 80 95 80" fill="none" stroke="#ff007f" stroke-width="1.5" />
    <path d="M 80 80 C 65 90 65 100 65 100" fill="none" stroke="#00f0ff" stroke-width="1.5" />
    <circle cx="80" cy="120" r="3" fill="#ffffff" />
  </g>

  <g transform="translate(230, 35)">
    <!-- '// AGRITECH' suffix removed from title -->
    <text x="0" y="25" class="title">KRISHIMITRA</text>
    <text x="0" y="50" class="subtitle">Multilingual AgriTech Assistant &amp; Disease Detector</text>
    <text x="0" y="80" class="body">EfficientNetB0 + Gemini Vision multilingual WhatsApp assistant for 27-crop disease classification.</text>
    <text x="0" y="100" class="body">Led WhatsApp agri-assistant conversations supporting over 1,200+ active users.</text>
    <text x="0" y="120" class="body">Selected in the Top 8 teams globally at the IBM SkillsBuild Hackathon.</text>
    
    <g transform="translate(0, 145)">
      <rect width="70" height="22" rx="5" fill="#1c2438" />
      <text x="35" y="14" class="tech-tag" text-anchor="middle">FASTAPI</text>
      
      <rect x="80" width="110" height="22" rx="5" fill="#1c2438" />
      <text x="135" y="14" class="tech-tag" text-anchor="middle">EFFICIENTNETB0</text>
      
      <rect x="200" width="105" height="22" rx="5" fill="#1c2438" />
      <text x="252.5" y="14" class="tech-tag" text-anchor="middle">GEMINI VISION</text>
      
      <rect x="315" width="85" height="22" rx="5" fill="#1c2438" />
      <text x="357.5" y="14" class="tech-tag" text-anchor="middle">STREAMLIT</text>
    </g>
  </g>
</svg>
