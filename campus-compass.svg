<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <style>
    .title { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #7B2CBF; font-size: 18px; letter-spacing: 2px; }
    .subtitle { font-family: 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; font-size: 13px; letter-spacing: 1px; }
    .body { font-family: 'Segoe UI', sans-serif; fill: #a3a3a3; font-size: 12px; }
    .tech-tag { font-family: 'Orbitron', monospace; font-weight: 700; fill: #00f0ff; font-size: 10px; }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="220" rx="12" fill="#070a13" stroke="#1f2438" stroke-width="1.5" />
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 200 0 L 200 220" stroke="#101524" stroke-width="1" />

  <g transform="translate(40, 30)">
    <rect width="160" height="160" rx="10" fill="#0c0f1d" stroke="#7B2CBF" stroke-width="1.5" filter="url(#glow)" />
    <circle cx="80" cy="80" r="50" fill="none" stroke="#00f0ff" stroke-width="2" />
    <circle cx="80" cy="80" r="40" fill="none" stroke="#7B2CBF" stroke-width="1" stroke-dasharray="8 4" />
    <path d="M 80 40 L 90 75 L 80 80 Z" fill="#ff007f" />
    <path d="M 80 120 L 70 85 L 80 80 Z" fill="#00f0ff" />
    <circle cx="80" cy="80" r="4" fill="#ffffff" />
  </g>

  <g transform="translate(230, 35)">
    <text x="0" y="25" class="title">🧭 CAMPUS COMPASS // ONLINE</text>
    <text x="0" y="50" class="subtitle">Multi-Tenant College Information System</text>
    <text x="0" y="80" class="body">Designed and engineered scalable backend retrieval servers using FastAPI.</text>
    <text x="0" y="100" class="body">Optimized message logs scaling via Pinecone Vector Database &amp; Redis cache.</text>
    <text x="0" y="120" class="body">Containerized application using Docker, enabling a robust Render deployment pipeline.</text>
    
    <g transform="translate(0, 145)">
      <rect width="70" height="22" rx="5" fill="#1c2438" />
      <text x="35" y="14" class="tech-tag" text-anchor="middle">FASTAPI</text>
      
      <rect x="80" width="80" height="22" rx="5" fill="#1c2438" />
      <text x="120" y="14" class="tech-tag" text-anchor="middle">PINECONE</text>
      
      <rect x="170" width="60" height="22" rx="5" fill="#1c2438" />
      <text x="200" y="14" class="tech-tag" text-anchor="middle">REDIS</text>
      
      <rect x="240" width="70" height="22" rx="5" fill="#1c2438" />
      <text x="275" y="14" class="tech-tag" text-anchor="middle">DOCKER</text>
      
      <rect x="320" width="70" height="22" rx="5" fill="#1c2438" />
      <text x="355" y="14" class="tech-tag" text-anchor="middle">RENDER</text>
    </g>
  </g>
</svg>
