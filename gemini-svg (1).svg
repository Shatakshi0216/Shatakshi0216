<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
  </defs>

  <rect width="900" height="420" fill="url(#bg)" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#30363d" stroke-width="2" rx="12"/>

  <text x="30" y="35" fill="#a3a3a3" font-family="monospace" font-size="16" letter-spacing="2">TEAMMATCH_AI //_ENGINEERING_PIPELINE</text>

  <g transform="translate(40, 70)">
    <rect width="220" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">STUDENT_PROFILES</text>
    <rect x="20" y="60" width="180" height="30" rx="4" fill="#1f2937"/>
    <rect x="20" y="100" width="180" height="30" rx="4" fill="#1f2937"/>
    <text x="20" y="180" fill="#00f0ff" font-family="monospace" font-size="12">FEATURE_VECTORIZATION</text>
    <text x="20" y="200" fill="#a3a3a3" font-family="monospace" font-size="10">Normalized 8D Feature Space</text>
  </g>

  <g transform="translate(320, 70)">
    <rect width="260" height="280" rx="8" fill="#161b22" stroke="#ff007f" stroke-width="2" filter="url(#glow)"/>
    <text x="130" y="30" text-anchor="middle" fill="#ff007f" font-family="monospace" font-weight="bold">ML_INFERENCE_CORE</text>
    
    <path d="M 40 70 L 220 70" stroke="#374151" stroke-width="2"/>
    <text x="40" y="100" fill="#00f0ff" font-family="monospace" font-size="13">1. KNN Recommendation</text>
    <text x="40" y="120" fill="#a3a3a3" font-family="monospace" font-size="11">Cosine Distance Similarity</text>

    <path d="M 40 160 L 220 160" stroke="#374151" stroke-width="2"/>
    <text x="40" y="190" fill="#ff007f" font-family="monospace" font-size="13">2. Archetype Clustering</text>
    <text x="40" y="210" fill="#a3a3a3" font-family="monospace" font-size="11">Dynamic Role Segmentation</text>
    
    <text x="130" y="260" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-weight="bold" font-size="14">LATENCY: &lt;50ms</text>
  </g>

  <g transform="translate(640, 70)">
    <rect width="220" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">BALANCED_ROSTER</text>
    
    <circle cx="50" cy="80" r="10" fill="#f59e0b"/>
    <text x="70" y="85" fill="#a3a3a3" font-family="monospace" font-size="12">Technical Archetype 1</text>
    
    <circle cx="50" cy="120" r="10" fill="#ec4899"/>
    <text x="70" y="125" fill="#a3a3a3" font-family="monospace" font-size="12">Technical Archetype 2</text>
    
    <circle cx="50" cy="160" r="10" fill="#8b5cf6"/>
    <text x="70" y="165" fill="#a3a3a3" font-family="monospace" font-size="12">Technical Archetype 3</text>
    
    <rect x="20" y="220" width="180" height="40" rx="4" fill="#064e3b" stroke="#10b981"/>
    <text x="110" y="245" text-anchor="middle" fill="#10b981" font-family="monospace" font-weight="bold">OPTIMIZED_DIVERSITY</text>
  </g>

  <path d="M 260 210 L 320 210" stroke="#00f0ff" stroke-width="2" stroke-dasharray="4"/>
  <path d="M 580 210 L 640 210" stroke="#ff007f" stroke-width="2" stroke-dasharray="4"/>
