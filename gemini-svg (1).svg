<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <style>
    .title { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #00f0ff; font-size: 18px; letter-spacing: 2px; }
    .subtitle { font-family: 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; font-size: 13px; letter-spacing: 1px; }
    .body { font-family: 'Segoe UI', sans-serif; fill: #a3a3a3; font-size: 12px; }
    .tech-tag { font-family: 'Orbitron', monospace; font-weight: 700; fill: #ff007f; font-size: 10px; }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="220" rx="12" fill="#070a13" stroke="#1f2438" stroke-width="1.5" />
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 200 0 L 200 220" stroke="#101524" stroke-width="1" />

  <g transform="translate(40, 30)">
    <rect width="160" height="160" rx="10" fill="#0c0f1d" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow)" />
    <line x1="80" y1="50" x2="50" y2="100" stroke="#ff007f" stroke-width="1.5" />
    <line x1="80" y1="50" x2="110" y2="100" stroke="#ff007f" stroke-width="1.5" />
    <line x1="50" y1="100" x2="110" y2="100" stroke="#00f0ff" stroke-width="1.5" />
    <line x1="50" y1="100" x2="80" y2="130" stroke="#00f0ff" stroke-width="1.5" />
    <line x1="110" y1="100" x2="80" y2="130" stroke="#00f0ff" stroke-width="1.5" />
    
    <circle cx="80" cy="50" r="10" fill="#070a13" stroke="#00f0ff" stroke-width="2" />
    <circle cx="50" cy="100" r="8" fill="#070a13" stroke="#ff007f" stroke-width="2" />
    <circle cx="110" cy="100" r="8" fill="#070a13" stroke="#ff007f" stroke-width="2" />
    <circle cx="80" cy="130" r="6" fill="#ffffff" />
  </g>

  <g transform="translate(230, 35)">
    <!-- Emoji removed from SVG text -->
    <text x="0" y="25" class="title">TEAMMATCH AI // COLLAB</text>
    <text x="0" y="50" class="subtitle">Intelligent Team Formation Platform</text>
    <text x="0" y="80" class="body">Engineered an 8-dimensional KNN recommendation engine using FastAPI and SQLite.</text>
    <text x="0" y="100" class="body">Achieved sub-50ms response times for teammate matching queries based on profile specs.</text>
    <text x="0" y="120" class="body">Integrated K-Means clustering to identify technical archetypes and surface skill-gaps.</text>
    
    <g transform="translate(0, 145)">
      <rect width="70" height="22" rx="5" fill="#1c2438" />
      <text x="35" y="14" class="tech-tag" text-anchor="middle">FASTAPI</text>
      
      <rect x="80" width="60" height="22" rx="5" fill="#1c2438" />
      <text x="110" y="14" class="tech-tag" text-anchor="middle">REACT</text>
      
      <rect x="150" width="50" height="22" rx="5" fill="#1c2438" />
      <text x="175" y="14" class="tech-tag" text-anchor="middle">KNN</text>
      
      <rect x="210" width="70" height="22" rx="5" fill="#1c2438" />
      <text x="245" y="14" class="tech-tag" text-anchor="middle">K-MEANS</text>
      
      <rect x="290" width="60" height="22" rx="5" fill="#1c2438" />
      <text x="320" y="14" class="tech-tag" text-anchor="middle">SQLITE</text>
    </g>
  </g>
</svg>
