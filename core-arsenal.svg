<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <style>
    .section-title { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #00f0ff; font-size: 13px; letter-spacing: 2px; }
    .skill-text { font-family: 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; font-size: 13px; }
    .skill-sub { font-family: 'Segoe UI', sans-serif; font-weight: 600; fill: #8a94a6; font-size: 11px; }
    .card-bg { fill: #0d1117; stroke: #1f242e; stroke-width: 1.5; }
    .glow-line { stroke-width: 2; stroke-linecap: round; }
    .header-text { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #ffffff; font-size: 15px; letter-spacing: 3px; }
  </style>

  <defs>
    <!-- Glow effects -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="cyan-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7B2CBF" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="15" fill="#070a13" stroke="url(#cyan-purple)" stroke-width="2" />
  
  <!-- Subtle Grid -->
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 0 200 L 800 200 M 0 240 L 800 240 M 0 280 L 800 280 M 0 320 L 800 320 M 100 0 L 100 380 M 200 0 L 200 380 M 300 0 L 300 380 M 400 0 L 400 380 M 500 0 L 500 380 M 600 0 L 600 380 M 700 0 L 700 380" stroke="#101524" stroke-width="1" />

  <!-- Title Header -->
  <text x="40" y="32" class="header-text">✦ CORE ARSENAL // SYSTEM MATRIX ✦</text>
  <line x1="40" y1="42" x2="760" y2="42" stroke="#1f2438" stroke-width="1.5" />

  <!-- PANEL 1: LANGUAGES & DATABASES (Top Left) -->
  <g transform="translate(40, 60)">
    <rect width="340" height="135" rx="10" class="card-bg" />
    <path d="M 10 0 L 330 0" stroke="#00f0ff" class="glow-line" filter="url(#glow-cyan)" />
    <text x="20" y="25" class="section-title">💻 LANGUAGES &amp; DATABASES</text>
    
    <!-- Skills & Progress bars simulating expertise -->
    <text x="20" y="55" class="skill-text">Python &amp; Java</text>
    <rect x="150" y="47" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="47" width="155" height="8" rx="4" fill="#00f0ff" filter="url(#glow-cyan)" />
    
    <text x="20" y="85" class="skill-text">SQL</text>
    <rect x="150" y="77" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="77" width="140" height="8" rx="4" fill="#00f0ff" />
    
    <text x="20" y="115" class="skill-text">PostgreSQL &amp; SQLite</text>
    <rect x="150" y="107" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="107" width="130" height="8" rx="4" fill="#00f0ff" />
  </g>

  <!-- PANEL 2: AI & ML ENGINE (Top Right) -->
  <g transform="translate(420, 60)">
    <rect width="340" height="135" rx="10" class="card-bg" />
    <path d="M 10 0 L 330 0" stroke="#ff007f" class="glow-line" filter="url(#glow-pink)" />
    <text x="20" y="25" class="section-title">🧠 AI &amp; MACHINE LEARNING</text>
    
    <text x="20" y="55" class="skill-text">TensorFlow / Keras</text>
    <rect x="150" y="47" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="47" width="130" height="8" rx="4" fill="#ff007f" filter="url(#glow-pink)" />
    
    <text x="20" y="85" class="skill-text">LangChain &amp; LLMs</text>
    <rect x="150" y="77" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="77" width="145" height="8" rx="4" fill="#ff007f" />
    
    <text x="20" y="115" class="skill-text">Scikit-learn</text>
    <rect x="150" y="107" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="107" width="150" height="8" rx="4" fill="#ff007f" />
  </g>

  <!-- PANEL 3: WEB DEV & APIS (Bottom Left) -->
  <g transform="translate(40, 215)">
    <rect width="340" height="135" rx="10" class="card-bg" />
    <path d="M 10 0 L 330 0" stroke="#7B2CBF" class="glow-line" filter="url(#glow-purple)" />
    <text x="20" y="25" class="section-title">🌐 BACKEND &amp; WEB DEV</text>
    
    <text x="20" y="55" class="skill-text">FastAPI</text>
    <rect x="150" y="47" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="47" width="155" height="8" rx="4" fill="#7B2CBF" filter="url(#glow-purple)" />
    
    <text x="20" y="85" class="skill-text">Streamlit</text>
    <rect x="150" y="77" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="77" width="145" height="8" rx="4" fill="#7B2CBF" />
    
    <text x="20" y="115" class="skill-text">HTML5, CSS3, Bootstrap</text>
    <rect x="150" y="107" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="107" width="120" height="8" rx="4" fill="#7B2CBF" />
  </g>

  <!-- PANEL 4: DEVOPS & TOOLS (Bottom Right) -->
  <g transform="translate(420, 215)">
    <rect width="340" height="135" rx="10" class="card-bg" />
    <path d="M 10 0 L 330 0" stroke="#00f0ff" class="glow-line" filter="url(#glow-cyan)" />
    <text x="20" y="25" class="section-title">🛠️ DEVOPS &amp; CLOUD TOOLS</text>
    
    <text x="20" y="55" class="skill-text">Docker &amp; Containers</text>
    <rect x="150" y="47" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="47" width="125" height="8" rx="4" fill="#00f0ff" filter="url(#glow-cyan)" />
    
    <text x="20" y="85" class="skill-text">Redis &amp; Pinecone</text>
    <rect x="150" y="77" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="77" width="135" height="8" rx="4" fill="#00f0ff" />
    
    <text x="20" y="115" class="skill-text">Git, Render &amp; Vercel</text>
    <rect x="150" y="107" width="170" height="8" rx="4" fill="#1f242e" />
    <rect x="150" y="107" width="150" height="8" rx="4" fill="#00f0ff" />
  </g>
</svg>
