<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
  </defs>

  <rect width="900" height="450" fill="url(#bg)" rx="12"/>
  <rect width="900" height="450" fill="none" stroke="#30363d" stroke-width="2" rx="12"/>

  <!-- Header -->
  <text x="30" y="35" fill="#a3a3a3" font-family="monospace" font-size="16" letter-spacing="2">FIELDLENS //_ENGINEERING_METRICS</text>

  <!-- COLUMN 1: IMAGE PRE-PROCESSING -->
  <g transform="translate(40, 70)">
    <rect width="250" height="320" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="125" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">PRE-PROCESSING_LAYER</text>
    <rect x="20" y="60" width="210" height="40" rx="4" fill="#1f2937"/>
    <text x="30" y="85" fill="#00f0ff" font-family="monospace" font-size="12">1. Noise Reduction [OK]</text>
    <rect x="20" y="110" width="210" height="40" rx="4" fill="#1f2937"/>
    <text x="30" y="135" fill="#00f0ff" font-family="monospace" font-size="12">2. Color Normalization [OK]</text>
    <rect x="20" y="160" width="210" height="40" rx="4" fill="#1f2937"/>
    <text x="30" y="185" fill="#00f0ff" font-family="monospace" font-size="12">3. Contrast Enhancement [OK]</text>
  </g>

  <!-- COLUMN 2: OCR ENGINE -->
  <g transform="translate(320, 70)">
    <rect width="260" height="320" rx="8" fill="#161b22" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
    <text x="130" y="30" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-weight="bold">EASYOCR_PIPELINE</text>
    
    <path d="M 40 70 L 220 70" stroke="#374151" stroke-width="2"/>
    <text x="40" y="100" fill="#ffffff" font-family="monospace" font-size="13">Feature Extraction</text>
    <text x="40" y="120" fill="#a3a3a3" font-family="monospace" font-size="11">Sequence recognition layers active</text>

    <path d="M 40 180 L 220 180" stroke="#374151" stroke-width="2"/>
    <text x="40" y="210" fill="#ff007f" font-family="monospace" font-size="13">ID_PARSING_LOGIC</text>
    <text x="40" y="230" fill="#a3a3a3" font-family="monospace" font-size="11">Regex validation for MAC/RSN</text>
    
    <text x="130" y="290" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-weight="bold" font-size="14">VALIDATION_RATE: 90%+</text>
  </g>

  <!-- COLUMN 3: SYSTEM IMPACT -->
  <g transform="translate(610, 70)">
    <rect width="250" height="320" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="125" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">SYSTEM_IMPACT</text>
    
    <text x="125" y="100" text-anchor="middle" fill="#ff007f" font-size="30" font-weight="bold">90%</text>
    <text x="125" y="120" text-anchor="middle" fill="#a3a3a3" font-family="monospace" font-size="10">AUTOMATION_ACCURACY</text>
    
    <rect x="25" y="180" width="200" height="40" rx="4" fill="#064e3b" stroke="#10b981"/>
    <text x="125" y="205" text-anchor="middle" fill="#10b981" font-family="monospace" font-weight="bold">WHATSAPP_INTEGRATION</text>
  </g>
</svg>
