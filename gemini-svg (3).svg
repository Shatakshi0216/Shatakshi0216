<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <style>
    .title { font-family: 'Orbitron', 'Segoe UI', monospace; font-weight: 900; fill: #00f0ff; font-size: 18px; letter-spacing: 2px; }
    .subtitle { font-family: 'Segoe UI', sans-serif; font-weight: 700; fill: #ffffff; font-size: 13px; letter-spacing: 1px; }
    .body { font-family: 'Segoe UI', sans-serif; fill: #a3a3a3; font-size: 12px; }
    .tech-tag { font-family: 'Orbitron', monospace; font-weight: 700; fill: #ff007f; font-size: 10px; }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="220" rx="12" fill="#070a13" stroke="#1f2438" stroke-width="1.5" />
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 200 0 L 200 220" stroke="#101524" stroke-width="1" />

  <g transform="translate(40, 30)">
    <rect width="160" height="160" rx="10" fill="#0c0f1d" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow)" />
    <circle cx="80" cy="80" r="35" fill="none" stroke="#00f0ff" stroke-width="2" />
    <circle cx="80" cy="80" r="25" fill="none" stroke="#ff007f" stroke-width="1" stroke-dasharray="6 3" />
    <rect x="55" y="55" width="50" height="50" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="10 5" />
    <circle cx="80" cy="80" r="5" fill="#ff007f" filter="url(#glow)" />
  </g>

  <g transform="translate(230, 35)">
    <text x="0" y="25" class="title">🔍 FIELDLENS // COMPUTER VISION</text>
    <text x="0" y="50" class="subtitle">AI Engineer Consultant</text>
    <text x="0" y="80" class="body">Built an OCR pipeline using EasyOCR to extract MAC/RSN IDs with 90%+ validation accuracy.</text>
    <text x="0" y="100" class="body">Designed and implemented image preprocessing and validation algorithms.</text>
    <text x="0" y="120" class="body">Automated telecom photo-validation webhooks via WhatsApp API integrations.</text>
    
    <g transform="translate(0, 145)">
      <rect width="80" height="22" rx="5" fill="#1c2438" />
      <text x="40" y="14" class="tech-tag" text-anchor="middle">EASYOCR</text>
      
      <rect x="90" width="70" height="22" rx="5" fill="#1c2438" />
      <text x="125" y="14" class="tech-tag" text-anchor="middle">FASTAPI</text>
      
      <rect x="170" width="105" height="22" rx="5" fill="#1c2438" />
      <text x="222.5" y="14" class="tech-tag" text-anchor="middle">WHATSAPP API</text>
    </g>
  </g>
</svg>
